aid: natural-resources-conservation-service
name: Natural Resources Conservation Service
description: >-
  The Natural Resources Conservation Service (NRCS) is a federal agency under
  the United States Department of Agriculture that works to help farmers,
  ranchers, and landowners conserve and protect natural resources. They
  provide technical assistance, financial assistance, and conservation
  planning to help individuals and communities implement conservation
  practices that improve soil health, water quality, and wildlife habitat.
type: Index
