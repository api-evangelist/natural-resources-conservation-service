apis:
  - aid: natural-resources-conservation-service:soil-data-access-api
    name: NRCS Soil Data Access
    description: >-
      Soil Data Access (SDA) is a USDA-NRCS web service that supports ad hoc
      query and real-time delivery of official soil survey data (SSURGO and
      STATSGO2) for any user-defined geographic area. The service exposes
      tabular query and spatial query endpoints that accept SQL-like requests
      and return JSON or XML responses.
    humanURL: https://sdmdataaccess.nrcs.usda.gov
    baseURL: https://sdmdataaccess.nrcs.usda.gov
    tags:
      - Soil
      - Data
      - SSURGO
      - STATSGO2
